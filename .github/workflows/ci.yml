name: Website CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: website-ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out website
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          path: unicity-aos-web
          persist-credentials: false

      - name: Check out canonical AOS CE installer
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: unicity-aos/aos-ce
          ref: f380bb844c01c225f8c3cecbe58299dd35a3de3f
          path: aos-ce
          persist-credentials: false
          sparse-checkout: install.sh
          sparse-checkout-cone-mode: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: unicity-aos-web/site/package-lock.json

      - name: Verify installer contract
        run: |
          sh -n unicity-aos-web/site/public/install.sh
          cmp aos-ce/install.sh unicity-aos-web/site/public/install.sh

      - name: Install dependencies
        working-directory: unicity-aos-web/site
        run: npm ci

      - name: Test
        working-directory: unicity-aos-web/site
        run: npm test

      - name: Typecheck
        working-directory: unicity-aos-web/site
        env:
          ASTRO_TELEMETRY_DISABLED: '1'
        run: npm run check

      - name: Build
        working-directory: unicity-aos-web/site
        env:
          ASTRO_TELEMETRY_DISABLED: '1'
        run: npm run build
